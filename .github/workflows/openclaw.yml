/* Updated .github/workflows/openclaw.yml */
name: OpenClaw AI Coding
on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to solve'
        required: true

jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
      - name: Install OpenClaw
        run: npm install -g openclaw@latest
        
      - name: Run OpenClaw with Live Telegram Tracking
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          # 1. Send initial message and get its ID
          RESPONSE=$(curl -s "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" -d "text=🤖 *OpenClaw Started for Issue #${{ github.event.inputs.issue_number }}*...%0AInitializing environment..." -d "parse_mode=Markdown")
          MSG_ID=$(echo $RESPONSE | jq -r '.result.message_id')

          # 2. Start a background loop to update the message every 20 seconds
          (
            while sleep 20; do
              if [ -f "agent.log" ]; then
                # Get last 10 lines, clean up special chars for URLs
                LATEST_LOG=$(tail -n 10 agent.log | sed 's/"//g' | sed "s/'//g")
                curl -s "https://api.telegram.org/bot${BOT_TOKEN}/editMessageText" \
                  -d "chat_id=${CHAT_ID}" \
                  -d "message_id=${MSG_ID}" \
                  -d "parse_mode=Markdown" \
                  -d "text=🤖 *OpenClaw Progress - Issue #${{ github.event.inputs.issue_number }}*%0A%0A\`\`\`%0A${LATEST_LOG}%0A\`\`\`"
              fi
            done
          ) &
          UPDATER_PID=$!

          # 3. Run the Agent
          openclaw onboard --auth-choice apiKey --token-provider openrouter --token "$OPENROUTER_API_KEY"
          openclaw start --issue ${{ github.event.inputs.issue_number }} --model "google/gemini-2.0-flash-exp:free" > agent.log 2>&1

          # 4. Final Update
          kill $UPDATER_PID
          curl -s "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" -d "text=✅ *Task Complete!* Check your GitHub for the new Branch/PR." -d "parse_mode=Markdown"
