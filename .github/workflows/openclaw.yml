/* Updated .github/workflows/openclaw.yml */
name: OpenClaw AI Coding
on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to solve'
        required: true

jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
      - name: Install OpenClaw
        run: npm install -g openclaw@latest
        
      - name: Run OpenClaw with Live Telegram Tracking
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          SERVER_URL: ${{ secrets.RENDER_EXTERNAL_URL }}
        run: |
          # 1. Initialize Log File
          touch agent.log
          
          # 2. Send initial message
          RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "text=🤖 <b>OpenClaw Agent Started</b> (Issue #${{ github.event.inputs.issue_number }})%0AStarting execution..." \
            -d "parse_mode=HTML")
          MSG_ID=$(echo $RESPONSE | jq -r '.result.message_id')
          
          if [ "$MSG_ID" == "null" ] || [ -z "$MSG_ID" ]; then
            echo "Failed to get MSG_ID from Telegram: $RESPONSE"
            exit 1
          fi

          # 3. Robust background loop
          (
            while sleep 8; do
              if [ -s "agent.log" ]; then
                LATEST_LOG=$(tail -n 12 agent.log | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')
                curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/editMessageText" \
                  -d "chat_id=${CHAT_ID}" \
                  -d "message_id=${MSG_ID}" \
                  -d "parse_mode=HTML" \
                  -d "text=🤖 <b>OpenClaw Progress</b> (Issue #${{ github.event.inputs.issue_number }})%0A%0A<pre>${LATEST_LOG}</pre>"
              fi
            done
          ) &
          UPDATER_PID=$!

          # 4. Run OpenClaw with explicit error capture
          git config --global user.email "bot@openclaw.com"
          git config --global user.name "OpenClaw Bot"
          
          echo "Current Directory Content:" >> agent.log
          ls -R >> agent.log
          
          # Run onboarding (may take a second)
          openclaw onboard --auth-choice apiKey --token-provider openrouter --token "$OPENROUTER_API_KEY" >> agent.log 2>&1
          
          # Run start command redirecting everything to agent.log
          openclaw start --issue ${{ github.event.inputs.issue_number }} --model "google/gemini-2.0-flash-exp:free" >> agent.log 2>&1 || (
            echo "❌ OpenClaw Execution Failed" >> agent.log
            exit 1
          )
          
          # 5. Finalize
          kill $UPDATER_PID || true
          DIFF=$(git diff master...HEAD | head -c 4000)
          BRANCH=$(git rev-parse --abbrev-ref HEAD)
          
          # Send final summary
          curl -X POST "${SERVER_URL}/agent-completion" \
            -H "Content-Type: application/json" \
            -d "{\"issue\": \"${{ github.event.inputs.issue_number }}\", \"diff\": $(echo "$DIFF" | jq -aRs .), \"branch\": \"$BRANCH\"}"
