/* Updated .github/workflows/openclaw.yml */
name: OpenClaw AI Coding
on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to solve'
        required: true

jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
      - name: Install OpenClaw
        run: npm install -g openclaw@latest
        
      - name: Run OpenClaw with Live Telegram Tracking
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          # 1. Initialize Log File
          touch agent.log
          
          # 2. Send initial message and get its ID
          RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "text=🤖 <b>OpenClaw Agent Started</b> (Issue #${{ github.event.inputs.issue_number }})%0A%0A<i>Initializing environment and scanning codebase...</i>" \
            -d "parse_mode=HTML")
          MSG_ID=$(echo $RESPONSE | jq -r '.result.message_id')
          
          # 3. Start a background loop to update the message every 8 seconds
          (
            while sleep 8; do
              if [ -s "agent.log" ]; then
                # Get last 10 lines and escape for HTML
                LATEST_LOG=$(tail -n 10 agent.log | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')
                
                curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/editMessageText" \
                  -d "chat_id=${CHAT_ID}" \
                  -d "message_id=${MSG_ID}" \
                  -d "parse_mode=HTML" \
                  -d "text=🤖 <b>OpenClaw Progress</b> (Issue #${{ github.event.inputs.issue_number }})%0A%0A<pre>${LATEST_LOG}</pre>"
              fi
            done
          ) &
          UPDATER_PID=$!

          # 4. Run the Agent
          openclaw onboard --auth-choice apiKey --token-provider openrouter --token "$OPENROUTER_API_KEY"
          openclaw start --issue ${{ github.event.inputs.issue_number }} --model "google/gemini-2.0-flash-exp:free" | tee -a agent.log

          # 5. Final Update
          sleep 2
          kill $UPDATER_PID || true
          
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "text=✅ <b>AI Task Complete!</b>%0AOpenClaw has finished issue #${{ github.event.inputs.issue_number }}. Check your GitHub for the new branch." \
            -d "parse_mode=HTML"
