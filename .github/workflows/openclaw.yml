/* Updated .github/workflows/openclaw.yml */
name: OpenClaw AI Coding
on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to solve'
        required: true

jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
      - name: Install OpenClaw
        run: npm install -g openclaw@latest
        
      - name: Run OpenClaw with Live Telegram Tracking
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          SERVER_URL: ${{ secrets.RENDER_EXTERNAL_URL }}
        run: |
          # 1. Initialize Log File
          touch agent.log
          
          # 2. Send initial message
          RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "text=🤖 <b>OpenClaw Agent Started</b> (Issue #${{ github.event.inputs.issue_number }})%0AInitializing..." \
            -d "parse_mode=HTML")
          MSG_ID=$(echo $RESPONSE | jq -r '.result.message_id')
          
          # 3. Enhanced background loop (every 7s)
          (
            while sleep 7; do
              if [ -s "agent.log" ]; then
                # Get last 15 lines, escape for HTML
                LATEST_LOG=$(tail -n 15 agent.log | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')
                curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/editMessageText" \
                  -d "chat_id=${CHAT_ID}" \
                  -d "message_id=${MSG_ID}" \
                  -d "parse_mode=HTML" \
                  -d "text=🤖 <b>OpenClaw Progress</b> (Issue #${{ github.event.inputs.issue_number }})%0A%0A<pre>${LATEST_LOG}</pre>"
              fi
            done
          ) &
          UPDATER_PID=$!

          # 4. Run OpenClaw (Unbuffered)
          git config --global user.email "bot@openclaw.com"
          git config --global user.name "OpenClaw Bot"
          
          # Force unbuffered output
          script -q -c "openclaw onboard --auth-choice apiKey --token-provider openrouter --token '$OPENROUTER_API_KEY' && openclaw start --issue ${{ github.event.inputs.issue_number }} --model 'google/gemini-2.0-flash-exp:free'" /dev/null | tee -a agent.log
          
          # 5. Capture Changes
          kill $UPDATER_PID || true
          DIFF=$(git diff master...HEAD | head -c 3000)
          BRANCH=$(git rev-parse --abbrev-ref HEAD)
          
          # 6. Send summary to Telegram via Server (to handle buttons)
          curl -X POST "${SERVER_URL}/agent-completion" \
            -H "Content-Type: application/json" \
            -d "{\"issue\": \"${{ github.event.inputs.issue_number }}\", \"diff\": $(echo "$DIFF" | jq -aRs .), \"branch\": \"$BRANCH\"}"

          # Fallback notification
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "text=✅ <b>AI Run Finished</b>%0ACheck the summary message above to Approve or Make PR." \
            -d "parse_mode=HTML"
